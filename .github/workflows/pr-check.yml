name: PR Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize]

jobs:
  size-check:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: placeholder
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: placeholder
      - name: Check bundle size
        run: |
          set -e
          large=$(find .next/static -name "*.js" -size +500k 2>/dev/null || true)
          if [ -n "$large" ]; then
            echo "$large" | while read -r f; do
              echo "Large bundle: $f ($(du -sh "$f" | cut -f1))"
            done
            exit 1
          fi
          echo "All bundles within size limits"

  i18n-check:
    name: Translation Keys Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Check all translation files have same keys
        run: npm run i18n:check
